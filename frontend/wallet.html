<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
</head>
<body>

<h2>💰 My Wallet</h2>

<div>
  <h3>Balance: ₹ <span id="balance">0</span></h3>
  <h3>Total Earned: ₹ <span id="earned">0</span></h3>
</div>

<button onclick="loadWallet()">Refresh</button>

<script>
const userId = "user123"; // बाद में dynamic करेंगे

async function loadWallet() {
  const res = await fetch(`http://localhost:5000/api/wallet/${userId}`);
  const data = await res.json();

  document.getElementById("balance").innerText = data.balance || 0;
  document.getElementById("earned").innerText = data.totalEarned || 0;
}

// auto load
loadWallet();
</script>

</body>
</html>
