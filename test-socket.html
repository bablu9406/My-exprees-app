<!DOCTYPE html>
<html>

<head>
  <title>Socket + Payment Test</title>

  <!-- ✅ Socket.io -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- ✅ Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

  <h2>🔥 Socket + Payment Test</h2>

  <!-- ✅ PAYMENT BUTTON -->
  <button onclick="payNow()">Pay ₹100</button>

  <script>
    // ================= SOCKET =================
    const socket = io("http://localhost:5000");

    socket.on("connect", () => {
      console.log("Connected:", socket.id);

      // user join
      socket.emit("join", "user123");
    });

    socket.on("receiveMessage", (data) => {
      console.log("New Message:", data);
    });

    // test message after 3 sec
    setTimeout(() => {
      socket.emit("sendMessage", {
        receiverId: "user123",
        text: "Hello realtime 🚀",
      });
    }, 3000);


    // ================= PAYMENT =================
    async function payNow() {

      try {
        // 🔹 backend order create
        const res = await fetch("http://localhost:5000/api/payment/create-order", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            amount: 100
          })
        });

        const data = await res.json();
        console.log("ORDER:", data);

        // 🔹 Razorpay popup
        const options = {
          key: "rzp_test_SVrbAExdcm8BKA",
          amount: data.order?.amount || 10000,
          currency: "INR",
          name: "Bablu App 💰",
          description: "Test Payment",
          order_id: data.order?.id,

          handler: async function (response) {

            console.log("SUCCESS:", response);

            // 🔹 verify
            const verifyRes = await fetch("http://localhost:5000/api/payment/verify", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                razorpay_order_id: response.razorpay_order_id,
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_signature: response.razorpay_signature,
                userId: "USER_ID_HERE",
                amount: 100
              })
            });

            const verifyData = await verifyRes.json();
            console.log("VERIFY:", verifyData);

            alert("Payment Success 🎉");
          },

          prefill: {
            name: "Test User",
            email: "test@test.com",
            contact: "9999999999"
          },

          theme: {
            color: "#3399cc"
          }
        };

        const rzp = new Razorpay(options);
        rzp.open();

      } catch (err) {
        console.error("Payment Error:", err);
        alert("Payment failed ❌");
      }
    }
  </script>

</body>
</html>
